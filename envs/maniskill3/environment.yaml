name: maniskill3_env
channels:
  - conda-forge
dependencies:
  - conda-forge::python=3.10
  - conda-forge::git
  - conda-forge::cmake
  # Uncomment if you need Maniskill to work in a notebook
  # - conda-forge::vulkan-tools
  # - conda-forge::vulkan-headers
  - pip
  - pip:
      - mani_skill==3.0.0b21
      - setuptools==81.0.0 # Newer versions of setuptools break mani_skill because pkg_resources was removed
